version: '3.8' 

services:

  app:

    build:

      context: .

      dockerfile: Dockerfile

    ports:

      - "3000:3000"

    volumes:

      - ./:/app

      - /app/node_modules

      - /app/.svelte-kit

      - /app/build

    environment:

      - NODE_ENV=development

      - VITE_API_URL=http://localhost:3000/api

      - HOST=0.0.0.0

    restart: unless-stopped

    healthcheck:

      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]

      interval: 30s

      timeout: 5s

      retries: 3

      start_period: 10s